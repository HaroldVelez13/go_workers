services:
  # -----------------------
  # Infraestructura
  # -----------------------

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"   # client
      - "8222:8222"   # monitoring
    command: ["-js"]  # habilita JetStream
    volumes:
      - nats_data:/data

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # -----------------------
  # Servicios
  # -----------------------

  gateway:
    build: ../gateway
    ports:
      - "8080:8080"
    depends_on:
      - nats
    environment:
      NATS_URL: nats://nats:4222

  auth-service:
    build: ../services/auth-service
    depends_on:
      - postgres
      - redis
      - nats
    environment:
      DB_URL: postgres://admin:admin@postgres:5432/app_db?sslmode=disable
      REDIS_URL: redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: supersecret

  user-service:
    build: ../services/user-service
    depends_on:
      - postgres
      - nats
    environment:
      DB_URL: postgres://admin:admin@postgres:5432/app_db?sslmode=disable
      NATS_URL: nats://nats:4222

  chat-service:
    build: ../services/chat-service
    depends_on:
      - postgres
      - nats
    environment:
      DB_URL: postgres://admin:admin@postgres:5432/app_db?sslmode=disable
      NATS_URL: nats://nats:4222

  llm-service:
    build: ../services/llm-service
    depends_on:
      - nats
      - redis
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis:6379
      LLM_API_KEY: your_key_here

  summary-service:
    build: ../services/summary-service
    depends_on:
      - nats
    environment:
      NATS_URL: nats://nats:4222

# -----------------------
# Volúmenes
# -----------------------

volumes:
  postgres_data:
  redis_data:
  nats_data: